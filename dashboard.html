<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Icon" href="assets/Mano Motors logo.png">
    <title>Owner Dashboard | Mano Motors</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // Authentication Check
        if (localStorage.getItem('isOwner') !== 'true') {
            window.location.href = 'index.html';
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0067B5',
                            slate: '#95AFBA',
                            sage: '#BDC4A7',
                            lime: '#D5E1A3',
                            light: '#FCFFF4',
                            dark: '#111111'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 103, 181, 0.2);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 103, 181, 0.4);
        }

        /* Loading Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #0067B5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body
    class="bg-brand-light dark:bg-brand-dark text-gray-800 dark:text-gray-200 transition-colors duration-300 min-h-screen pb-20">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="font-bold uppercase tracking-widest text-sm">Processing Image...</p>
    </div>

    <nav class="bg-brand-dark text-white p-6 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="assets/Mano Motors logo.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-bold uppercase tracking-tighter">Owner Dashboard</h1>
        </div>
        <div class="flex items-center gap-4">
            <a href="gallery.html" target="_blank"
                class="px-4 py-2 text-sm font-bold text-brand-lime hover:text-white transition-colors">View Live
                Gallery</a>
            <button id="logout-btn"
                class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-bold transition-all transform hover:scale-105">
                Logout
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <!-- Stats Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="bg-white dark:bg-[#1a1a1a] p-8 rounded-[2rem] shadow-lg border border-gray-100 dark:border-white/5"
                data-aos="fade-up">
                <div class="w-12 h-12 rounded-2xl bg-brand-blue/10 flex items-center justify-center mb-4">
                    <i data-lucide="image" class="text-brand-blue"></i>
                </div>
                <h3 class="text-gray-500 text-sm font-bold uppercase">Gallery Items</h3>
                <p id="total-items-count" class="text-3xl font-black text-brand-dark dark:text-white mt-2">0</p>
            </div>
            <div class="bg-white dark:bg-[#1a1a1a] p-8 rounded-[2rem] shadow-lg border border-gray-100 dark:border-white/5"
                data-aos="fade-up" data-aos-delay="100">
                <div class="w-12 h-12 rounded-2xl bg-brand-lime/10 flex items-center justify-center mb-4">
                    <i data-lucide="eye" class="text-brand-blue dark:text-brand-lime"></i>
                </div>
                <h3 class="text-gray-500 text-sm font-bold uppercase">Public Visibility</h3>
                <p class="text-3xl font-black text-brand-dark dark:text-white mt-2 font-bold text-green-500">Active</p>
            </div>
            <div class="bg-white dark:bg-[#1a1a1a] p-8 rounded-[2rem] shadow-lg border border-gray-100 dark:border-white/5"
                data-aos="fade-up" data-aos-delay="200">
                <div class="w-12 h-12 rounded-2xl bg-blue-100 flex items-center justify-center mb-4">
                    <i data-lucide="database" class="text-blue-600"></i>
                </div>
                <h3 class="text-gray-500 text-sm font-bold uppercase">Storage Status</h3>
                <p class="text-3xl font-black text-brand-dark dark:text-white mt-2">Local</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Add Item Form -->
            <div class="lg:col-span-5" data-aos="fade-right">
                <div
                    class="bg-white dark:bg-[#1a1a1a] p-10 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-white/5 sticky top-28">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-brand-blue rounded-xl flex items-center justify-center">
                            <i data-lucide="plus" class="text-white w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-black uppercase tracking-tighter">Add to Gallery</h2>
                    </div>

                    <form id="gallery-form" class="space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-500 uppercase mb-2">Upload your
                                image</label>
                            <input type="file" id="image-url" required placeholder="e.g., assets/parts/engine.jpg"
                                class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-brand-dark border border-gray-100 dark:border-white/10 focus:border-brand-blue outline-none transition-all dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 uppercase mb-2">Heading</label>
                            <input type="text" id="item-heading" required placeholder="e.g., BMW Engine Assembly"
                                class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-brand-dark border border-gray-100 dark:border-white/10 focus:border-brand-blue outline-none transition-all dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-500 uppercase mb-2">Description</label>
                            <textarea id="item-desc" required rows="4" placeholder="Brief description of the item..."
                                class="w-full px-5 py-4 rounded-2xl bg-gray-50 dark:bg-brand-dark border border-gray-100 dark:border-white/10 focus:border-brand-blue outline-none transition-all dark:text-white resize-none"></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-brand-blue hover:bg-brand-blue/90 text-white font-black py-5 rounded-2xl transition-all shadow-lg transform hover:-translate-y-1 uppercase tracking-widest">
                            Add to Live Site
                        </button>
                    </form>
                </div>
            </div>

            <!-- Management List -->
            <div class="lg:col-span-7" data-aos="fade-left">
                <div
                    class="bg-white dark:bg-[#1a1a1a] rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-white/5 overflow-hidden">
                    <div
                        class="p-8 border-b border-gray-100 dark:border-white/5 flex justify-between items-center bg-gray-50/50 dark:bg-white/5">
                        <div class="flex items-center gap-3">
                            <i data-lucide="image" class="text-brand-blue"></i>
                            <h2 class="text-xl font-bold uppercase tracking-tighter">Existing Items</h2>
                        </div>
                        <span id="items-badge"
                            class="px-4 py-1 bg-brand-blue text-white rounded-full text-xs font-bold">0 Items</span>
                    </div>

                    <div id="gallery-list"
                        class="divide-y divide-gray-100 dark:divide-white/5 max-h-[800px] overflow-y-auto custom-scrollbar">
                        <!-- Items will be injected here -->
                    </div>

                    <!-- Empty State for List -->
                    <div id="list-empty" class="hidden p-20 text-center">
                        <p class="text-brand-slate italic">No items added yet. Use the form to get started.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize
        lucide.createIcons();
        AOS.init({ duration: 800 });

        const logoutBtn = document.getElementById('logout-btn');
        const galleryForm = document.getElementById('gallery-form');
        const galleryList = document.getElementById('gallery-list');
        const listEmpty = document.getElementById('list-empty');
        const totalCountEl = document.getElementById('total-items-count');
        const itemsBadge = document.getElementById('items-badge');

        const STORAGE_KEY = 'mano_motors_gallery';

        // Load and Render
        function renderGallery() {
            const items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

            totalCountEl.textContent = items.length;
            itemsBadge.textContent = `${items.length} Items`;

            if (items.length === 0) {
                galleryList.innerHTML = '';
                listEmpty.classList.remove('hidden');
                return;
            }

            listEmpty.classList.add('hidden');
            galleryList.innerHTML = items.map((item, index) => `
                <div class="p-6 flex items-center gap-6 group hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
                    <div class="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 border border-gray-100 dark:border-white/10">
                        <img src="${item.image}" alt="" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" 
                             onerror="this.src='https://placehold.co/100x100?text=Invalid+Path'">
                    </div>
                    <div class="flex-grow">
                        <h4 class="font-bold text-lg dark:text-white mb-1">${item.heading}</h4>
                        <p class="text-sm text-brand-slate line-clamp-2">${item.paragraph}</p>
                    </div>
                    <button onclick="deleteItem(${index})" class="p-3 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 rounded-xl hover:bg-red-600 hover:text-white transition-all">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            `).join('');

            lucide.createIcons();
            AOS.refresh();
        }

        // Add Item
        galleryForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = galleryForm.querySelector('button[type="submit"]');
            const fileInput = document.getElementById('image-url');
            const heading = document.getElementById('item-heading').value;
            const paragraph = document.getElementById('item-desc').value;

            if (!fileInput.files || !fileInput.files[0]) {
                alert('Please select an image file');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-pulse">Uploading...</span>';

            const file = fileInput.files[0];
            const loadingOverlay = document.getElementById('loading-overlay');

            // Image Compression Helper
            const compressImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;

                            const MAX_SIZE = 1000; // Smaller max size for localStorage
                            if (width > height) {
                                if (width > MAX_SIZE) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                }
                            } else {
                                if (height > MAX_SIZE) {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // Lower quality for stability
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.onerror = reject;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

            try {
                loadingOverlay.style.display = 'flex';
                const base64Image = await compressImage(file);

                const newItem = {
                    image: base64Image,
                    heading: heading,
                    paragraph: paragraph,
                    createdAt: new Date().toISOString()
                };

                const items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                items.unshift(newItem);
                
                // Try saving, check for quota limits
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
                } catch (quotaError) {
                    alert('Storage is full! Please delete some old items before adding more.');
                    loadingOverlay.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Add to Live Site';
                    return;
                }

                galleryForm.reset();
                renderGallery();
            } catch (err) {
                console.error(err);
                alert('Error processing image. Please try a smaller file.');
            } finally {
                loadingOverlay.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Add to Live Site';
            }
        });

        // Delete Item
        window.deleteItem = (index) => {
            if (confirm('Are you sure you want to delete this gallery item?')) {
                const items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                items.splice(index, 1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
                renderGallery();
            }
        };

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('isOwner');
            window.location.href = 'index.html';
        });

        // Initial Load
        renderGallery();
    </script>
</body>

</html>
